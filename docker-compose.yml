services:
  nginx:
    image: nginx:alpine
    container_name: proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "8443:8443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - aas-web-ui
      - aas-registry
      - submodel-registry
      - aas-env
      - keycloak


  mongodb:
    image: mongo:7.0
    container_name: mongodb
    restart: always
    stop_grace_period: 60s
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongoAdmin
      MONGO_INITDB_ROOT_PASSWORD: mongoPassword
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 20s

  keycloak-db:
    image: postgres:16
    container_name: keycloak-db
    restart: always
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: keycloak
    restart: always
    command: ["start-dev", "--import-realm"]
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-db
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_RELATIVE_PATH: /auth
    ports:
      - "8084:8080"
    volumes:
      - keycloak-data:/opt/keycloak/data
      - ./_files/keycloak/realm-basyx.json:/opt/keycloak/data/import/realm-basyx.json:ro
    depends_on:
      keycloak-db:
        condition: service_healthy

  aas-registry:
    image: eclipsebasyx/aas-registry-log-mongodb:2.0.0-SNAPSHOT
    container_name: aas-registry
    ports:
      - '8082:8080'
    environment:
      - SERVER_PORT=8080
      - BASYX_CORS_ALLOWED_ORIGINS=https://*
      # - BASYX_CORS_ALLOWED_ORIGINS=https://192.168.56.110
      - BASYX_CORS_ALLOWED_METHODS=GET,POST,PATCH,DELETE,PUT,OPTIONS,HEAD
      - BASYX_CORS_ALLOWED_HEADERS=Authorization,Content-Type,Accept
    volumes:
      - ./_files/aas-registry.yml:/workspace/config/application.yml
      - ./_files/rules/aas_registry_rbac_rules.json:/workspace/config/rbac_rules.json:ro
    restart: always
    depends_on:
      mongodb:
        condition: service_healthy

  submodel-registry:
    image: eclipsebasyx/submodel-registry-log-mem:2.0.0-SNAPSHOT
    container_name: submodel-registry
    volumes:
      - ./_files/sm-registry.yml:/workspace/config/application.yml
      - ./_files/rules/sm_registry_rbac_riles.json:/application/config/rbac_rules.json:ro
    ports:
      - '8083:8080'
    environment:
      - SERVER_PORT=8080
      - BASYX_CORS_ALLOWED_ORIGINS=https://*
      # - BASYX_CORS_ALLOWED_ORIGINS=https://192.168.56.110
      - BASYX_CORS_ALLOWED_METHODS=GET,POST,PATCH,DELETE,PUT,OPTIONS,HEAD
      - BASYX_CORS_ALLOWED_HEADERS=Authorization,Content-Type,Accept
    restart: always
    depends_on:
      mongodb:
        condition: service_healthy

  aas-env:
    image: eclipsebasyx/aas-environment:2.0.0-SNAPSHOT
    container_name: aas-env
    volumes:
      - ./aas:/application/aas
      - ./_files/aas-env.properties/application.properties:/application/application.properties
      - ./_files/rules/aas_env_rbac_rules.json:/application/rbac_rules.json:ro
    ports:
      - '8081:8081'
    environment:
      - SERVER_PORT=8081
      - JAVA_TOOL_OPTIONS=-Xms512m -Xmx1024m
    depends_on:
      mongodb:
        condition: service_healthy
      aas-registry:
        condition: service_started
      submodel-registry:
        condition: service_started

  aas-web-ui:
    image: eclipsebasyx/aas-gui:SNAPSHOT
    container_name: aas-web-ui
    ports:
      - "3000:3000"
    environment:
      ALLOW_EDITING: "true"
      ALLOW_UPLOADING: "true"
      PRIMARY_LIGHT_COLOR: "#0cb2f0"
      PRIMARY_DARK_COLOR: "#f69222"
      AAS_REGISTRY_PATH: "https://192.168.56.110/shell-descriptors"
      SUBMODEL_REGISTRY_PATH: "https://192.168.56.110/submodel-descriptors"
      AAS_REPO_PATH: "https://192.168.56.110/shells"
      SUBMODEL_REPO_PATH: "https://192.168.56.110/submodels"
      KEYCLOAK_URL: "https://192.168.56.110/auth"
      KEYCLOAK_REALM: "basyx"
      KEYCLOAK_CLIENT_ID: "basyx-web"
      KEYCLOAK_CLIENT_SECRET: "basyx-admin"
    volumes:
      - ./basyx-infra.yml/basyx-infra.yml:/application/config/basyx-infra.yml:ro
    restart: always
    depends_on:
      aas-env:
        condition: service_started


      
    
