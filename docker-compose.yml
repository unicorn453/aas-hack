  # __ TRACTUS-X services _____________________________________________________________
  postgres:
    image: postgres:16
    container_name: postgres
    restart: always
    environment:
      POSTGRES_DB: edc
      POSTGRES_USER: edc
      POSTGRES_PASSWORD: edc
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 10
    networks:
      - edc-network

  vault:
    image: hashicorp/vault:1.16
    container_name: vault
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    command: server -dev
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 10
    volumes:
      - ./_files/vault_init.sh:/vault-init.sh
    entrypoint: ["/bin/sh", "-c", "sh /vault-init.sh & vault server -dev"]
    networks:
      - edc-network

  edc-controlplane:
    image: tractusx/edc-controlplane-postgresql-hashicorp-vault:latest
    container_name: edc-controlplane
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      vault:
        condition: service_healthy
      edc-dataplane:
        condition: service_started
    ports:
      - "19191:19191"
      - "19193:19193"
    volumes:
      - ./_files/edc-controlplane.properties/application.properties:/app/configuration.properties:ro
      - ./_files/rules/edc_controlplane_rbac_rules.json:/application/rbac_rules.json:ro
    networks:
      - edc-network

  edc-dataplane:
    image: tractusx/edc-dataplane-hashicorp-vault:latest
    container_name: edc-dataplane
    restart: always
    depends_on:
      vault:
        condition: service_healthy
    networks:
      - edc-network
    ports:
      - "19291:19291"
    environment:
      WEB_HTTP_PUBLIC_HOST: 0.0.0.0
      WEB_HTTP_PUBLIC_PORT: 19291
      WEB_HTTP_PUBLIC_PATH: /api/public
      EDC_DATAPLANE_API_PUBLIC_BASEURL: https://${HOST_ADDRESS}:19291/api/public
      EDC_VAULT_HASHICORP_URL: http://vault:8200
      EDC_VAULT_HASHICORP_TOKEN: root
    volumes:
      - ./_files/edc-dataplane.properties/application.properties:/app/configuration.properties:ro

  edc-init:
    image: curlimages/curl:8.9.1
    container_name: edc-init
    depends_on:
      edc-controlplane:
        condition: service_started
    restart: "no"
    command: ["sh", "/init/init_edc.sh"]
    volumes:
      - ./_files/init_edc.sh:/init/init_edc.sh:ro
      - ./_files/edc-init:/config:ro
    networks:
      - edc-network


volumes:
  mongodb-data:
  postgres-data:
  keycloak-db-data:
  keycloak-data:
  mqtt-data:
  mqtt-log:

networks:
  edc-network:
