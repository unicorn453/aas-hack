name: aas-hack

# Jede Maschine, die dieses Repo klont, betreibt einen komplett
# eigenständigen AAS-Stack: eigenes Keycloak, eigene AAS-/Submodel-Registry,
# eigenes AAS-Environment + Web UI. Kein gemeinsamer Shared-Host, keine
# Abhängigkeit von der Erreichbarkeit einer anderen Maschine.
#
#   1. python3 join.py
#   2. docker compose up -d
#
# Datenaustausch zwischen Personen/Partnern läuft gezielt über aas-cli
# (upload/download gegen den jeweils anderen Server), nicht automatisch
# über eine gemeinsame Registry -- siehe aas-cli/README.md.
#
# Kommunikation:
#   Browser -> immer HTTPS über nginx (Port 443, selbstsigniertes Zertifikat)
#   Container untereinander -> internes Compose-Netz (Service-Namen)

services:
  nginx:
    image: nginx:alpine
    container_name: proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - aas-web-ui

  mongodb:
    image: mongo:7.0
    container_name: mongodb
    # Backend für aas-env UND die eigene AAS-/Submodel-Registry (getrennte
    # Datenbanken, siehe node/aas-env.properties und keycloak-registry/*.yml)
    restart: always
    stop_grace_period: 60s
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongoAdmin
      MONGO_INITDB_ROOT_PASSWORD: mongoPassword
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 20s

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: keycloak
    restart: always
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded
    volumes:
      - keycloak-data:/opt/keycloak/data
      # Realm wird nur beim ERSTEN Start importiert; nach Änderungen:
      # docker compose down -v (löscht auch Mongo-Daten!)
      - ./keycloak-registry/realm-basyx.json:/opt/keycloak/data/import/realm-basyx.json:ro

  aas-registry:
    image: eclipsebasyx/aas-registry-log-mongodb:2.0.0-SNAPSHOT
    container_name: aas-registry
    restart: always
    environment:
      SERVER_PORT: "8080"
    volumes:
      - ./keycloak-registry/aas-registry.yml:/workspace/config/application.yml:ro
      - ./keycloak-registry/aas-registry-rbac.json:/workspace/config/rbac_rules.json:ro
    depends_on:
      mongodb:
        condition: service_healthy
      keycloak:
        condition: service_started

  submodel-registry:
    image: eclipsebasyx/submodel-registry-log-mongodb:2.0.0-SNAPSHOT
    container_name: submodel-registry
    restart: always
    environment:
      SERVER_PORT: "8080"
    volumes:
      - ./keycloak-registry/sm-registry.yml:/workspace/config/application.yml:ro
      - ./keycloak-registry/sm-registry-rbac.json:/workspace/config/rbac_rules.json:ro
    depends_on:
      mongodb:
        condition: service_healthy
      keycloak:
        condition: service_started

  aas-env:
    image: eclipsebasyx/aas-environment:2.0.0-SNAPSHOT
    container_name: aas-env
    restart: always
    environment:
      JAVA_TOOL_OPTIONS: -Xms256m -Xmx1024m
      # Diese Adresse landet in den Descriptoren der eigenen Registry --
      # darüber laden Partner (via aas-cli) unsere Daten live.
      BASYX_EXTERNALURL: https://${HOST_ADDRESS}
      # Automatische An-/Abmeldung aller Shells/Submodels an der EIGENEN Registry
      BASYX_AASREPOSITORY_FEATURE_REGISTRYINTEGRATION: http://aas-registry:8080
      BASYX_SUBMODELREPOSITORY_FEATURE_REGISTRYINTEGRATION: http://submodel-registry:8080
      BASYX_AASREPOSITORY_FEATURE_REGISTRYINTEGRATION_AUTHORIZATION_ENABLED: "true"
      BASYX_AASREPOSITORY_FEATURE_REGISTRYINTEGRATION_AUTHORIZATION_TOKEN_ENDPOINT: http://keycloak:8080/auth/realms/basyx/protocol/openid-connect/token
      BASYX_AASREPOSITORY_FEATURE_REGISTRYINTEGRATION_AUTHORIZATION_GRANT_TYPE: PASSWORD
      BASYX_AASREPOSITORY_FEATURE_REGISTRYINTEGRATION_AUTHORIZATION_CLIENT_ID: basyx-api
      BASYX_AASREPOSITORY_FEATURE_REGISTRYINTEGRATION_AUTHORIZATION_CLIENT_SECRET: basyx-api-secret
      BASYX_AASREPOSITORY_FEATURE_REGISTRYINTEGRATION_AUTHORIZATION_USERNAME: basyx-admin
      BASYX_AASREPOSITORY_FEATURE_REGISTRYINTEGRATION_AUTHORIZATION_PASSWORD: basyx-admin
      BASYX_SUBMODELREPOSITORY_FEATURE_REGISTRYINTEGRATION_AUTHORIZATION_ENABLED: "true"
      BASYX_SUBMODELREPOSITORY_FEATURE_REGISTRYINTEGRATION_AUTHORIZATION_TOKEN_ENDPOINT: http://keycloak:8080/auth/realms/basyx/protocol/openid-connect/token
      BASYX_SUBMODELREPOSITORY_FEATURE_REGISTRYINTEGRATION_AUTHORIZATION_GRANT_TYPE: PASSWORD
      BASYX_SUBMODELREPOSITORY_FEATURE_REGISTRYINTEGRATION_AUTHORIZATION_CLIENT_ID: basyx-api
      BASYX_SUBMODELREPOSITORY_FEATURE_REGISTRYINTEGRATION_AUTHORIZATION_CLIENT_SECRET: basyx-api-secret
      BASYX_SUBMODELREPOSITORY_FEATURE_REGISTRYINTEGRATION_AUTHORIZATION_USERNAME: basyx-admin
      BASYX_SUBMODELREPOSITORY_FEATURE_REGISTRYINTEGRATION_AUTHORIZATION_PASSWORD: basyx-admin
      # Token-Prüfung gegen das eigene Keycloak (Signatur via JWKS)
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/auth/realms/basyx/protocol/openid-connect/certs
    volumes:
      - ./node/aas-env.properties:/application/application.properties:ro
      - ./node/rbac_rules.json:/application/rbac_rules.json:ro
    depends_on:
      mongodb:
        condition: service_healthy

  aas-web-ui:
    image: eclipsebasyx/aas-gui:SNAPSHOT
    container_name: aas-web-ui
    restart: always
    environment:
      ALLOW_EDITING: "true"
      ALLOW_UPLOADING: "true"
      PRIMARY_LIGHT_COLOR: "#0cb2f0"
      PRIMARY_DARK_COLOR: "#f69222"
      # Registry und Repository sind jetzt beide der EIGENE Server
      AAS_REGISTRY_PATH: https://${HOST_ADDRESS}/shell-descriptors
      SUBMODEL_REGISTRY_PATH: https://${HOST_ADDRESS}/submodel-descriptors
      AAS_REPO_PATH: https://${HOST_ADDRESS}/shells
      SUBMODEL_REPO_PATH: https://${HOST_ADDRESS}/submodels
      CD_REPO_PATH: https://${HOST_ADDRESS}/concept-descriptions
      KEYCLOAK_ACTIVE: "true"
      KEYCLOAK_URL: https://${HOST_ADDRESS}/auth
      KEYCLOAK_REALM: basyx
      KEYCLOAK_CLIENT_ID: basyx-web
    depends_on:
      - aas-env

volumes:
  mongodb-data:
  keycloak-data:

networks:
  # Pinned: Docker/Podman-Default-Pools können mit dem LAN (192.168.x)
  # kollidieren -- dann routen Container LAN-IPs intern und sind von
  # außen unerreichbar (502). Bei Bedarf anpassen.
  default:
    ipam:
      config:
        - subnet: 172.30.99.0/24
