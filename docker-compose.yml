services:
  nginx:
    image: nginx:alpine
    container_name: proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "8443:8443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    # no depends_on for keycloak: it only runs on the machine hosting the
    # (team) keycloak, see the "keycloak" compose profile
    depends_on:
      - aas-web-ui
      - aas-registry
      - submodel-registry
      - aas-env
      - keycloak
      - dpp-public-api
      - dpp-web-ui


  mongodb:
    image: mongo:7.0
    container_name: mongodb
    restart: always
    stop_grace_period: 60s
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongoAdmin
      MONGO_INITDB_ROOT_PASSWORD: mongoPassword
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 20s

  keycloak-db:
    image: postgres:16
    container_name: keycloak-db
    restart: always
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: keycloak
    restart: always
    command: ["start-dev", "--import-realm"]
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-db
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_RELATIVE_PATH: /auth
    ports:
      - "8084:8080"
    volumes:
      - keycloak-data:/opt/keycloak/data
      - ./_files/keycloak/realm-basyx.json:/opt/keycloak/data/import/realm-basyx.json:ro
    depends_on:
      keycloak-db:
        condition: service_healthy

  mqtt-broker:
    image: eclipse-mosquitto:2
    container_name: mqtt-broker
    restart: always
    ports:
      - "1883:1883"
    volumes:
      - ./mqtt-integration/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mqtt-data:/mosquitto/data
      - mqtt-log:/mosquitto/log

  mqtt-aas-subscriber:
    build:
      context: ./mqtt-integration/mqtt-aas-subscriber
      network: host
    container_name: mqtt-aas-subscriber
    restart: always
    environment:
      MQTT_BROKER_HOST: ${MQTT_BROKER_HOST:-mqtt-broker}
      MQTT_BROKER_PORT: "1883"
      MQTT_TOPIC: factory/pgn-plus-p-64-1/telemetry
      AAS_BASE_URL: http://aas-env:8081
      KEYCLOAK_URL: http://keycloak:8080/auth
      KEYCLOAK_USERNAME: basyx-admin
      KEYCLOAK_PASSWORD: basyx-admin
      AAS_VERIFY_TLS: "true"
      AAS_ID: https://example.org/aas/schunk/pgn-plus-p-64-1
      TIMESERIES_ID: https://example.org/submodels/schunk/pgn-plus-p-64-1/timeseries
    depends_on:
      keycloak:
        condition: service_started
      aas-env:
        condition: service_started

  mqtt-publisher:
    build:
      context: ./simulation/mqtt-publisher
      network: host
    container_name: mqtt-publisher
    profiles: ["simulation"]
    restart: unless-stopped
    environment:
      MQTT_BROKER_HOST: ${MQTT_BROKER_HOST:-mqtt-broker}
      MQTT_BROKER_PORT: "1883"
      MQTT_TOPIC: factory/pgn-plus-p-64-1/telemetry
      SIMULATION_INTERVAL: "2"
    depends_on:
      mqtt-broker:
        condition: service_started

  dpp-public-api:
    build: ./dpp-public-api
    container_name: dpp-public-api
    restart: always
    environment:
      AAS_BASE_URL: http://aas-env:8081
      KEYCLOAK_URL: http://keycloak:8080/auth
      KEYCLOAK_USERNAME: basyx-admin
      KEYCLOAK_PASSWORD: basyx-admin
      PUBLIC_BASE_URL: https://${HOST_ADDRESS}
      PUBLIC_SUBMODEL_IDS: ""
      PUBLIC_AAS_IDS: ""
      PRIVATE_SUBMODEL_PATTERNS: timeseries,telemetry,live
    depends_on:
      keycloak:
        condition: service_started
      aas-env:
        condition: service_started

  aas-upload-gateway:
    build: ./aas-upload-gateway
    container_name: aas-upload-gateway
    restart: always
    environment:
      AAS_BASE_URL: http://aas-env:8081
      KEYCLOAK_URL: http://keycloak:8080/auth
      AAS_REGISTRY_URL: http://aas-registry:8080
      SUBMODEL_REGISTRY_URL: http://submodel-registry:8080
      EXTERNAL_URL: https://${HOST_ADDRESS}
      KEYCLOAK_USERNAME: basyx-admin
      KEYCLOAK_PASSWORD: basyx-admin
    depends_on:
      keycloak:
        condition: service_started
      aas-env:
        condition: service_started

  aas-registry:
    image: eclipsebasyx/aas-registry-log-mongodb:2.0.0-milestone-10
    container_name: aas-registry
    environment:
      - SERVER_PORT=8080
      - BASYX_CORS_ALLOWED_ORIGINS=https://*
      # - BASYX_CORS_ALLOWED_ORIGINS=https://${HOST_ADDRESS}
      - BASYX_CORS_ALLOWED_METHODS=GET,POST,PATCH,DELETE,PUT,OPTIONS,HEAD
      - BASYX_CORS_ALLOWED_HEADERS=Authorization,Content-Type,Accept
    volumes:
      - ./_files/aas-registry.yml:/workspace/config/application.yml
      - ./_files/rules/aas_registry_rbac_rules.json:/workspace/config/rbac_rules.json:ro
    restart: always
    depends_on:
      mongodb:
        condition: service_healthy

  submodel-registry:
    image: eclipsebasyx/submodel-registry-log-mongodb:2.0.0-milestone-10
    container_name: submodel-registry
    volumes:
      - ./_files/sm-registry.yml:/workspace/config/application.yml
      - ./_files/rules/sm_registry_rbac_riles.json:/application/config/rbac_rules.json:ro
    environment:
      - SERVER_PORT=8080
      - BASYX_CORS_ALLOWED_ORIGINS=https://*
      # - BASYX_CORS_ALLOWED_ORIGINS=https://${HOST_ADDRESS}
      - BASYX_CORS_ALLOWED_METHODS=GET,POST,PATCH,DELETE,PUT,OPTIONS,HEAD
      - BASYX_CORS_ALLOWED_HEADERS=Authorization,Content-Type,Accept
    restart: always
    depends_on:
      mongodb:
        condition: service_healthy

  aas-env:
    image: eclipsebasyx/aas-environment:2.0.0-milestone-10
    container_name: aas-env
    volumes:
      - ./aas:/application/aas
      - ./_files/aas-env.properties/application.properties:/application/application.properties
      - ./_files/rules/aas_env_rbac_rules.json:/application/rbac_rules.json:ro
    ports:
      - '8081:8081'
    environment:
      - SERVER_PORT=8081
      - MONGODB_HOST=mongodb
      - MONGODB_PORT=27017
      - MONGODB_DATABASE=aas-env
      - MONGODB_USERNAME=mongoAdmin
      - MONGODB_PASSWORD=mongoPassword
      - MONGODB_AUTHENTICATION_DATABASE=admin
      - BASYX_EXTERNAL_URL=https://${HOST_ADDRESS}
      - JAVA_TOOL_OPTIONS=-Xms512m -Xmx1024m
    depends_on:
      mongodb:
        condition: service_healthy
      aas-registry:
        condition: service_started
      submodel-registry:
        condition: service_started

  aas-web-ui:
    image: eclipsebasyx/aas-gui:SNAPSHOT
    container_name: aas-web-ui
    ports:
      - "3000:3000"
    environment:
      ALLOW_EDITING: "true"
      ALLOW_UPLOADING: "true"
      PRIMARY_LIGHT_COLOR: "#0cb2f0"
      PRIMARY_DARK_COLOR: "#f69222"
    volumes:
      - ./basyx-infra.yml/basyx-infra.yml:/basyx-infra.yml:ro
    restart: always
    depends_on:
      aas-env:
        condition: service_started

  dpp-web-ui:
    build:
      context: ./dpp-web-ui
      network: host
      args:
        VITE_PUBLIC_API_BASE: ${VITE_PUBLIC_API_BASE:-https://${HOST_ADDRESS:-172.17.251.203}/public}
        VITE_SECURED_API_BASE: ${VITE_SECURED_API_BASE:-https://${HOST_ADDRESS:-172.17.251.203}}
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-https://${HOST_ADDRESS:-172.17.251.203}/auth}
        VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM:-basyx}
        VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID:-basyx-web}
        VITE_AAS_ID: ${VITE_AAS_ID:-https://example.org/aas/schunk/pgn-plus-p-64-1}
        VITE_TIMESERIES_ID: ${VITE_TIMESERIES_ID:-https://example.org/submodels/schunk/pgn-plus-p-64-1/timeseries}
        VITE_POLL_INTERVAL_MS: ${VITE_POLL_INTERVAL_MS:-2000}
        VITE_REQUEST_TIMEOUT_MS: ${VITE_REQUEST_TIMEOUT_MS:-8000}
    container_name: dpp-web-ui
    restart: always
    ports:
      - "3001:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - dpp-public-api
      - keycloak


      
    
