server.port=8081
basyx.backend = MongoDB
spring.mongodb.host=mongodb
spring.mongodb.database=aas-env
spring.mongodb.authentication-database=admin
spring.mongodb.username=mongoAdmin
spring.mongodb.password=mongoPassword

# Disable startup preload to avoid ID conflicts during manual uploads from UI
# basyx.environment=file:aas
basyx.cors.allowed-origins=*
basyx.cors.allowed-methods=GET,POST,PATCH,DELETE,PUT,OPTIONS,HEAD

basyx.aasrepository.feature.registryintegration = http://aas-registry:8080
basyx.submodelrepository.feature.registryintegration = http://submodel-registry:8080
basyx.externalurl = https://192.168.56.110
basyx.aasrepository.feature.registryintegration.authorization.enabled = true
basyx.aasrepository.feature.registryintegration.authorization.token-endpoint = http://keycloak:8080/auth/realms/basyx/protocol/openid-connect/token
basyx.aasrepository.feature.registryintegration.authorization.grant-type = PASSWORD
basyx.aasrepository.feature.registryintegration.authorization.client-id = basyx-api
basyx.aasrepository.feature.registryintegration.authorization.client-secret = basyx-api-secret
basyx.aasrepository.feature.registryintegration.authorization.username = basyx-admin
basyx.aasrepository.feature.registryintegration.authorization.password = basyx-admin
basyx.submodelrepository.feature.registryintegration.authorization.enabled = true
basyx.submodelrepository.feature.registryintegration.authorization.token-endpoint = http://keycloak:8080/auth/realms/basyx/protocol/openid-connect/token
basyx.submodelrepository.feature.registryintegration.authorization.grant-type = PASSWORD
basyx.submodelrepository.feature.registryintegration.authorization.client-id = basyx-api
basyx.submodelrepository.feature.registryintegration.authorization.client-secret = basyx-api-secret
basyx.submodelrepository.feature.registryintegration.authorization.username = basyx-admin
basyx.submodelrepository.feature.registryintegration.authorization.password = basyx-admin


basyx.feature.authorization.enabled = true
basyx.feature.authorization.type = rbac
basyx.feature.authorization.jwtBearerTokenProvider = keycloak
basyx.feature.authorization.rbac.file = file:/application/rbac_rules.json
basyx.aasenvironment.authorization.preconfiguration.token-endpoint = http://keycloak:8080/auth/realms/basyx/protocol/openid-connect/token
basyx.aasenvironment.authorization.preconfiguration.grant-type = PASSWORD
basyx.aasenvironment.authorization.preconfiguration.client-id = basyx-api
basyx.aasenvironment.authorization.preconfiguration.client-secret = basyx-api-secret
basyx.aasenvironment.authorization.preconfiguration.username = basyx-admin
basyx.aasenvironment.authorization.preconfiguration.password = basyx-admin
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://keycloak:8080/auth/realms/basyx/protocol/openid-connect/certs
## max upload
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB