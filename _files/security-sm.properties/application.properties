server.port=8081
basyx.backend = MongoDB
spring.mongodb.host=mongodb
spring.mongodb.database=aas-env
spring.mongodb.authentication-database=admin
spring.mongodb.username=mongoAdmin
spring.mongodb.password=mongoPassword   
spring.mogodb.uri=mongodb://mongoAdmin:mongoPassword@mongodb:27017/aas-env?authSource=admin
basyx.feature.authorization.enabled = true
basyx.feature.authorization.type = rbac
basyx.feature.authorization.jwtBearerTokenProvider = keycloak
basyx.feature.authorization.rbac.file = classpath:rbac_rules.json
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://keycloak:8080/auth/realms/basyx