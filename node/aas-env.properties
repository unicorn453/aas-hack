# AAS Environment dieses Nodes.
# Deployment-abhängige Werte (URLs, Registry-Integration, Keycloak) kommen
# als Umgebungsvariablen aus docker-compose.yml / .env (join.py).

server.port=8081

basyx.backend=MongoDB
spring.mongodb.host=mongodb
spring.mongodb.database=aas-env
spring.mongodb.authentication-database=admin
spring.mongodb.username=mongoAdmin
spring.mongodb.password=mongoPassword

basyx.cors.allowed-origins=*
basyx.cors.allowed-methods=GET,POST,PATCH,DELETE,PUT,OPTIONS,HEAD

# Zugriffskontrolle: Token vom gemeinsamen Keycloak, Regeln in rbac_rules.json
basyx.feature.authorization.enabled=true
basyx.feature.authorization.type=rbac
basyx.feature.authorization.jwtBearerTokenProvider=keycloak
basyx.feature.authorization.rbac.file=file:/application/rbac_rules.json

spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
