# NOTE: this file is mounted read-only into aas-web-ui and does not support
# env var substitution - keep the address below in sync with HOST_ADDRESS in .env
infrastructures:
  default: infra1
  infra1:
    name: Minimal BaSyx
    components:
      aasRegistry:
        baseUrl: https://192.168.56.110/shell-descriptors
        hasDiscoveryIntegration: true
      submodelRegistry:
        baseUrl: https://192.168.56.110/submodel-descriptors
      aasRepository:
        baseUrl: https://192.168.56.110/shells
        hasRegistryIntegration: true
      submodelRepository:
        baseUrl: https://192.168.56.110/submodels
        hasRegistryIntegration: true
      conceptDescriptionRepository:
        baseUrl: https://192.168.56.110/concept-descriptions
    security:
      type: oauth2
      oauth2:
        flow: authorizationCode
        tokenUrl: https://192.168.56.110/auth/realms/basyx/protocol/openid-connect/token
        authorizationUrl: https://192.168.56.110/auth/realms/basyx/protocol/openid-connect/auth
        issuer: https://192.168.56.110/auth/realms/basyx
        scopes:
          openid: OpenID scope
          profile: User profile
          email: User email
