<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="920" viewBox="0 0 1500 920" role="img" aria-labelledby="title desc">
<title id="title">Public DPP and protected MQTT live telemetry architecture</title>
<desc id="desc">Colored architecture diagram showing public DPP data, administrator authentication, and MQTT telemetry flowing into a protected AAS TimeSeries.</desc>
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f8fbff"/><stop offset="1" stop-color="#eef4fb"/></linearGradient>
<linearGradient id="public" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#1d9a78"/><stop offset="1" stop-color="#1470a6"/></linearGradient>
<linearGradient id="secure" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#7357c7"/><stop offset="1" stop-color="#3b55a8"/></linearGradient>
<linearGradient id="mqtt" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#e28b2d"/><stop offset="1" stop-color="#d14d46"/></linearGradient>
<filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1c3850" flood-opacity=".15"/></filter>
<marker id="ap" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#168b91"/></marker>
<marker id="as" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#5e50b5"/></marker>
<marker id="am" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#d87035"/></marker>
<style>.title{font:700 30px Arial,sans-serif;fill:#16324a}.subtitle{font:400 16px Arial,sans-serif;fill:#587084}.small{font:700 13px Arial,sans-serif;fill:#355269}.bt{font:700 19px Arial,sans-serif;fill:#fff}.bx{font:400 14px Arial,sans-serif;fill:#eaf5fb}.label{font:700 13px Arial,sans-serif}.mono{font:600 13px monospace;fill:#24465d}.legend{font:600 13px Arial,sans-serif;fill:#3c556b}</style>
</defs>
<rect width="1500" height="920" fill="url(#bg)"/>
<text x="70" y="68" class="title">AAS Digital Product Passport · public data and protected live telemetry</text>
<text x="70" y="98" class="subtitle">Stable product information is public; operational measurements are authenticated and delivered through MQTT into the protected TimeSeries.</text>
<rect x="60" y="135" width="1380" height="245" rx="24" fill="#eaf8f5" stroke="#b9e3d8" stroke-width="2"/><text x="90" y="173" class="small">PROFILE 01 · PUBLIC DPP DATA</text><text x="90" y="199" class="subtitle">Anonymous read access through the public facade</text>
<g filter="url(#shadow)"><rect x="95" y="235" width="220" height="98" rx="16" fill="url(#public)"/><text x="125" y="273" class="bt">Public visitor</text><text x="125" y="300" class="bx">Browser or CLI</text><rect x="430" y="235" width="245" height="98" rx="16" fill="url(#public)"/><text x="460" y="273" class="bt">HTTPS /public</text><text x="460" y="300" class="bx">dpp-public-api facade</text><rect x="790" y="235" width="245" height="98" rx="16" fill="url(#public)"/><text x="820" y="273" class="bt">AAS Environment</text><text x="820" y="300" class="bx">public shell + submodels</text><rect x="1150" y="235" width="220" height="98" rx="16" fill="url(#public)"/><text x="1180" y="273" class="bt">DPP content</text><text x="1180" y="300" class="bx">identity · media · documents</text></g>
<path d="M315 284 H420" stroke="#168b91" stroke-width="4" marker-end="url(#ap)"/><path d="M675 284 H780" stroke="#168b91" stroke-width="4" marker-end="url(#ap)"/><path d="M1035 284 H1140" stroke="#168b91" stroke-width="4" marker-end="url(#ap)"/><text x="348" y="266" class="label" fill="#168b91">no token</text><text x="705" y="266" class="label" fill="#168b91">filtered read</text>
<rect x="60" y="415" width="1380" height="215" rx="24" fill="#f1edff" stroke="#d3c9f5" stroke-width="2"/><text x="90" y="453" class="small">PROFILE 02 · ADMIN-ONLY LIVE DATA</text><text x="90" y="479" class="subtitle">Keycloak authorization is required before protected shell and TimeSeries reads</text>
<g filter="url(#shadow)"><rect x="95" y="515" width="220" height="78" rx="16" fill="url(#secure)"/><text x="125" y="549" class="bt">Administrator</text><text x="125" y="574" class="bx">custom DPP UI</text><rect x="430" y="515" width="245" height="78" rx="16" fill="url(#secure)"/><text x="470" y="549" class="bt">Keycloak</text><text x="470" y="574" class="bx">basyx realm · admin role</text><rect x="790" y="515" width="245" height="78" rx="16" fill="url(#secure)"/><text x="820" y="549" class="bt">Protected AAS API</text><text x="820" y="574" class="bx">authenticated GET /submodels</text><rect x="1150" y="515" width="220" height="78" rx="16" fill="url(#secure)"/><text x="1183" y="549" class="bt">Live dashboard</text><text x="1183" y="574" class="bx">charts · KPI · status</text></g>
<path d="M315 554 H420" stroke="#5e50b5" stroke-width="4" marker-end="url(#as)"/><path d="M675 554 H780" stroke="#5e50b5" stroke-width="4" marker-end="url(#as)"/><path d="M1035 554 H1140" stroke="#5e50b5" stroke-width="4" marker-end="url(#as)"/><text x="338" y="536" class="label" fill="#5e50b5">login</text><text x="700" y="536" class="label" fill="#5e50b5">Bearer token</text>
<rect x="60" y="665" width="1380" height="185" rx="24" fill="#fff4e8" stroke="#f3d2a7" stroke-width="2"/><text x="90" y="703" class="small">MACHINE DATA PATH · MQTT TO AAS</text><text x="90" y="729" class="subtitle">The browser never connects to MQTT; the subscriber writes authenticated AAS data.</text>
<g filter="url(#shadow)"><rect x="95" y="765" width="205" height="58" rx="14" fill="url(#mqtt)"/><text x="128" y="800" class="bt">Machine / simulator</text><rect x="365" y="765" width="205" height="58" rx="14" fill="url(#mqtt)"/><text x="425" y="800" class="bt">MQTT publisher</text><rect x="635" y="765" width="205" height="58" rx="14" fill="url(#mqtt)"/><text x="690" y="800" class="bt">Mosquitto :1883</text><rect x="905" y="765" width="205" height="58" rx="14" fill="url(#mqtt)"/><text x="937" y="800" class="bt">AAS subscriber</text><rect x="1175" y="765" width="205" height="58" rx="14" fill="url(#secure)"/><text x="1218" y="800" class="bt">TimeSeries</text></g>
<path d="M300 794 H355" stroke="#d87035" stroke-width="4" marker-end="url(#am)"/><path d="M570 794 H625" stroke="#d87035" stroke-width="4" marker-end="url(#am)"/><path d="M840 794 H895" stroke="#d87035" stroke-width="4" marker-end="url(#am)"/><path d="M1110 794 H1165" stroke="#5e50b5" stroke-width="4" marker-end="url(#as)"/><text x="405" y="750" class="mono">JSON telemetry</text><text x="675" y="750" class="mono">factory/pgn-plus-p-64-1/telemetry</text><text x="1195" y="750" class="mono">authenticated PUT</text>
<circle cx="92" cy="887" r="7" fill="#168b91"/><text x="108" y="892" class="legend">public read path</text><circle cx="270" cy="887" r="7" fill="#5e50b5"/><text x="286" y="892" class="legend">authenticated path</text><circle cx="482" cy="887" r="7" fill="#d87035"/><text x="498" y="892" class="legend">MQTT transport</text>
</svg>
